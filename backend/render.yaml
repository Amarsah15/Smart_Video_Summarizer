services:
  - type: web
    name: smart-video-summarizer-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ALLOWED_ORIGINS
        value: https://your-frontend-domain.com
      - key: WHISPER_MODEL
        value: base
      - key: CONTENT_MODERATION_ENABLED
        value: false
      - key: ASYNC_VIDEO_PROCESSING
        value: true
      - key: FAST_SUMMARY_TRIGGER_WORDS
        value: 0
      - key: FAST_KEY_POINT_TRIGGER_SEGMENTS
        value: 0
